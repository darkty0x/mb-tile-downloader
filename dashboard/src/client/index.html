<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PTG Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,400..700,0..1,0&family=Roboto+Flex:opsz,wght@8..144,400..800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <aside class="fleet-rail">
        <section class="brand">
          <div class="brand-mark" aria-hidden="true">
            <svg viewBox="0 0 180 92">
              <ellipse class="orbit orbit-blue" cx="90" cy="46" rx="78" ry="22" transform="rotate(-22 90 46)" />
              <ellipse class="orbit orbit-red" cx="88" cy="47" rx="73" ry="20" transform="rotate(20 88 47)" />
              <text x="32" y="62">PTG</text>
            </svg>
          </div>
          <div>
            <h1>PTG Dashboard</h1>
            <p>PTG Management Dashboard</p>
          </div>
        </section>

        <nav id="tabs" class="side-nav" aria-label="Dashboard sections"></nav>

        <section class="rail-footer">
          <label class="token-box">
            <span>Admin Token</span>
            <input id="admin-token" type="password" autocomplete="off" />
          </label>
          <button class="refresh-button" id="refresh" title="Refresh" aria-label="Refresh"></button>
        </section>
      </aside>

      <section class="workspace">
        <header class="topbar">
          <div>
            <div class="machine-title-row">
              <h2 id="machine-title">PTG Management Dashboard</h2>
              <span id="machine-status" class="status-pill neutral">Waiting</span>
            </div>
            <div id="machine-meta" class="machine-meta"></div>
          </div>
        </header>

        <div id="notice" class="notice" hidden></div>
        <section id="view" class="view"></section>
      </section>

      <aside id="server-panel" class="server-panel"></aside>
      <aside id="inspector" class="inspector" hidden></aside>
    </main>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
