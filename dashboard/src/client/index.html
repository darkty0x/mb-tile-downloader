<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PTG Dashboard</title>
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <aside class="fleet-rail">
        <section class="brand">
          <div class="brand-mark" aria-hidden="true">
            <span>P</span><span>T</span><span>G</span>
          </div>
          <div>
            <h1>PTG Dashboard</h1>
            <p>PTG Management Dashboard</p>
          </div>
        </section>

        <nav id="tabs" class="side-nav" aria-label="Dashboard sections"></nav>

        <section class="rail-footer">
          <label class="token-box">
            <span>Admin Token</span>
            <input id="admin-token" type="password" autocomplete="off" />
          </label>
          <button class="refresh-button" id="refresh" title="Refresh" aria-label="Refresh"></button>
        </section>
      </aside>

      <section class="workspace">
        <header class="topbar">
          <div>
            <div class="machine-title-row">
              <h2 id="machine-title">No machine selected</h2>
              <span id="machine-status" class="status-pill neutral">Waiting</span>
            </div>
            <div id="machine-meta" class="machine-meta"></div>
          </div>
          <div class="command-bar">
            <button class="command secondary" data-command="run_preflight"></button>
            <button class="command primary" data-command="start_pipeline"></button>
            <button class="command secondary" data-command="pause_after_range"></button>
            <button class="command danger" data-command="stop_pipeline"></button>
            <button class="command secondary" data-command="sync_config"></button>
            <button class="command secondary" data-command="sync_env"></button>
          </div>
        </header>

        <div id="notice" class="notice" hidden></div>
        <section id="view" class="view"></section>
      </section>

      <aside id="inspector" class="inspector" hidden></aside>
    </main>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
